version: '3.8'

services:
  oq-api:
    build: .
    container_name: oq-api
    ports:
      - '3100:3100'
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3100/health']
      interval: 30s
      timeout: 5s
      retries: 3
